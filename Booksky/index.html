<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booksky | Personal Library</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="navbar">
        <h1>Booksky</h1>
    </div>

    <div class="container" id="container">
        <div class="book-container">
            <h2>Rich Dad Poor Dad</h2>
            <h5>Robert Kiyosaki</h5>
            <p>A book that fundamentally changed how millions of people view personal finance and financial independence.</p>
            <button onclick="deletebook(event)">Delete</button>
        </div>
    </div>

    <div class="popup-overlay"></div>
    <div class="popup-box">
        <h2>Add New Book</h2>
        <form>
            <input type="text" placeholder="Book Title" id="book-title-input">
            <input type="text" placeholder="Author Name" id="book-author-input">
            <textarea placeholder="Short Description..." id="book-description-input" rows="4"></textarea>
            <div class="popup-buttons">
                <button id="add-book">ADD</button>
                <button id="cancel-popup" class="cancel-btn">CANCEL</button>
            </div>
        </form>
    </div>

    <button class="add-button" id="add-popup-button">+</button>

    <script src="script.js"></script>
</body>
</html>
