<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Digital Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero">
        <div class="background-shapes">
            <div class="shape circle-1"></div>
            <div class="shape circle-2"></div>
        </div>
        <div class="container">
            <div class="clock">
                <div class="time-box">
                    <span id="hrs">00</span>
                    <p>HOURS</p>
                </div>
                <div class="colon">:</div>
                <div class="time-box">
                    <span id="mins">00</span>
                    <p>MINS</p>
                </div>
                <div class="colon">:</div>
                <div class="time-box">
                    <span id="sec">00</span>
                    <p>SEC</p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
